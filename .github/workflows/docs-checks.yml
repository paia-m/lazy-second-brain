name: Docs Checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check committed whitespace
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" && -n "${GITHUB_BASE_REF:-}" ]]; then
            base_commit="$(python3 - <<'PY'
          import json
          import os

          with open(os.environ["GITHUB_EVENT_PATH"], "r", encoding="utf-8") as handle:
              event = json.load(handle)
          print(event.get("pull_request", {}).get("base", {}).get("sha", ""))
          PY
          )"
            if [[ -n "${base_commit}" ]] && git cat-file -e "${base_commit}^{commit}" 2>/dev/null; then
              git diff --check "$(git merge-base HEAD "${base_commit}")" HEAD
            elif git rev-parse HEAD^ >/dev/null 2>&1; then
              git diff --check HEAD^ HEAD
            else
              git diff-tree --check --no-commit-id --root -r HEAD
            fi
            exit
          fi

          before_commit="$(python3 - <<'PY'
          import json
          import os

          with open(os.environ["GITHUB_EVENT_PATH"], "r", encoding="utf-8") as handle:
              print(json.load(handle).get("before", ""))
          PY
          )"

          if [[ -n "${before_commit}" && ! "${before_commit}" =~ ^0+$ ]] && git cat-file -e "${before_commit}^{commit}" 2>/dev/null; then
            git diff --check "${before_commit}" HEAD
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi

      - name: Validate JSON files
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r -d '' file; do
            python3 -m json.tool "$file" >/dev/null
          done < <(find . -path ./.git -prune -o -path ./node_modules -prune -o -type f -name '*.json' -print0)
